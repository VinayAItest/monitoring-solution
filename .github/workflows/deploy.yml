name: 🚀 Build & Deploy Monitoring Stack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ACR_NAME:       shiyomonitoring001
  IMAGE_NAME:     monitoring-app
  RESOURCE_GROUP: monitoring-rg
  APP_NAME:       monitoring-webapp

jobs:
  # ─────────────────────────────────────
  # JOB 1 — Build & Push Docker Image
  # ─────────────────────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☁️ Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🔐 Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: 🐳 Build Docker image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -f docker/Dockerfile ./app

      - name: 📤 Push image to ACR
        run: |
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: ✅ Verify image in ACR
        run: az acr repository list --name ${{ env.ACR_NAME }} --output table

  # ─────────────────────────────────────
  # JOB 2 — Terraform Infrastructure
  # ─────────────────────────────────────
  terraform:
    name: 🏗 Terraform Apply
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☁️ Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: 📦 Terraform Init
        run: terraform init

      - name: 👀 Terraform Plan
        run: terraform plan -out=tfplan

      - name: 🚀 Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ─────────────────────────────────────
  # JOB 3 — Deploy to Azure App Service
  # ─────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: [ build, terraform ]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☁️ Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🚀 Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: ✅ Verify deployment
        run: |
          echo "App deployed successfully!"
          echo "URL: https://${{ env.APP_NAME }}.azurewebsites.net"
          curl -f https://${{ env.APP_NAME }}.azurewebsites.net/health || echo "Health check pending..."

  # ─────────────────────────────────────
  # JOB 4 — Notify Result
  # ─────────────────────────────────────
  notify:
    name: 📢 Notify Result
    runs-on: ubuntu-latest
    needs: [ build, terraform, deploy ]
    if: always()

    steps:
      - name: ✅ Success summary
        if: success()
        run: |
          echo "=========================================="
          echo "✅ DEPLOYMENT SUCCESSFUL!"
          echo "=========================================="
          echo "🐳 Image: shiyomonitoring001.azurecr.io/monitoring-app:${{ github.sha }}"
          echo "🌐 App URL: https://monitoring-webapp.azurewebsites.net"
          echo "📊 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          echo "=========================================="

      - name: ❌ Failure summary
        if: failure()
        run: |
          echo "=========================================="
          echo "❌ DEPLOYMENT FAILED!"
          echo "Check the logs above for details"
          echo "=========================================="