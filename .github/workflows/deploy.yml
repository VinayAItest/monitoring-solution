name: Build and Deploy Monitoring Stack

on:
  push:
    branches: [ main ]

env:
  ACR_NAME:       shiyomonitoring001
  IMAGE_NAME:     monitoring-app
  RESOURCE_GROUP: monitoring-rg
  APP_NAME:       monitoring-webapp

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: terraform plan
      - name: Terraform Apply
        run: terraform apply -auto-approve

  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -f docker/Dockerfile ./app
      - name: Push image to ACR
        run: |
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Verify image in ACR
        run: az acr repository list --name ${{ env.ACR_NAME }} --output table

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: [ terraform, build ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Print app URL
        run: |
          echo "Deployed successfully!"
          echo "URL: https://${{ env.APP_NAME }}.azurewebsites.net/health"

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [ terraform, build, deploy ]
    if: always()
    steps:
      - name: Success
        if: success()
        run: |
          echo "=========================================="
          echo "PIPELINE SUCCESSFUL!"
          echo "URL: https://monitoring-webapp.azurewebsites.net"
          echo "=========================================="
      - name: Failure
        if: failure()
        run: echo "PIPELINE FAILED - Check logs above"
