apiVersion: v1
kind: Secret
metadata:
  name: servicenow-credentials
  namespace: monitoring
type: Opaque
stringData:
  SNOW_INSTANCE: "your-instance.service-now.com"   # ← replace
  SNOW_USER: "admin"                                 # ← replace
  SNOW_PASS: "your-password"                         # ← replace

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicenow-bridge
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicenow-bridge
  template:
    metadata:
      labels:
        app: servicenow-bridge
    spec:
      containers:
        - name: servicenow-bridge
          image: monitoringacr.azurecr.io/servicenow-bridge:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: servicenow-credentials
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: servicenow-bridge
  namespace: monitoring
spec:
  selector:
    app: servicenow-bridge
  ports:
    - port: 8080
      targetPort: 8080
